<!DOCTYPE html>
<html>
<head>
    <title>OEE Dashboard</title>
</head>
<body>
    <h1>OEE Dashboard Calculator</h1>

    <form action="/calculate" method="post">
        <label>Planned Production Time (minutes):</label><br>
        <input type="number" step="0.01" name="planned_time" required><br><br>

        <label>Operating Time (minutes):</label><br>
        <input type="number" step="0.01" name="operating_time" required><br><br>

        <label>Ideal Cycle Time (minutes per part):</label><br>
        <input type="number" step="0.0001" name="ideal_cycle_time" required><br><br>

        <label>Total Parts Produced:</label><br>
        <input type="number" name="total_count" required><br><br>

        <label>Good Parts Produced:</label><br>
        <input type="number" name="good_count" required><br><br>

        <button type="submit">Calculate OEE</button>
    </form>
</body>
</html>
