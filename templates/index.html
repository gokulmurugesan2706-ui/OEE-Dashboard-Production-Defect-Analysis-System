<!DOCTYPE html>
<html>
<head>
    <title>OEE Dashboard and Production Defect Analysis</title>
</head>
<body>
    <h1>OEE Dashboard Calculator</h1>

    <form action="/calculate" method="post">

        <label>Planned Production Time (minutes):</label><br>
        <input type="number" step="0.01" name="planned_time" required><br><br>

        <label>Operating Time (minutes):</label><br>
        <input type="number" step="0.01" name="operating_time" required><br><br>

        <label>Ideal Cycle Time (minutes per part):</label><br>
        <input type="number" step="0.0001" name="ideal_cycle_time" required><br><br>

        <label>Total Parts Produced:</label><br>
        <input type="number" name="total_count" required><br><br>

        <label>Good Parts Produced:</label><br>
        <input type="number" name="good_count" required><br><br>

        <h2>Production Defect Analysis</h2>

        <label>Scratch Defects:</label><br>
        <input type="number" name="scratch_defects" value="0" min="0" required><br><br>

        <label>Crack Defects:</label><br>
        <input type="number" name="crack_defects" value="0" min="0" required><br><br>

        <label>Dimension Errors:</label><br>
        <input type="number" name="dimension_defects" value="0" min="0" required><br><br>

        <label>Porosity Defects:</label><br>
        <input type="number" name="porosity_defects" value="0" min="0" required><br><br>

        <button type="submit">Calculate OEE and Analyze Defects</button>
    </form>
</body>
</html>
